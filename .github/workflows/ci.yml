name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: smart-schedule/package-lock.json

      - name: Install dependencies
        run: npm --prefix smart-schedule ci

      - name: Install Playwright browser
        run: npm --prefix smart-schedule exec playwright install --with-deps chromium

      - name: Lint
        run: npm --prefix smart-schedule run lint

      - name: Typecheck
        run: npm --prefix smart-schedule run typecheck

      - name: Build
        run: npm --prefix smart-schedule run build

      - name: Unit tests
        run: npm --prefix smart-schedule test --if-present

      - name: Health endpoint check
        run: |
          npm --prefix smart-schedule run preview -- --host 127.0.0.1 --port 4174 &
          PREVIEW_PID=$!
          trap 'kill ${PREVIEW_PID}' EXIT

          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4174/healthz > /tmp/healthz.txt; then
              break
            fi
            sleep 1
          done

          grep -q '"status":"ok"' /tmp/healthz.txt

      - name: E2E smoke
        env:
          CI: "true"
        run: npm --prefix smart-schedule run e2e:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: smart-schedule/playwright-report
          if-no-files-found: ignore

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd ~/process-planning
            git fetch origin main
            git reset --hard origin/main
            cd smart-schedule/docker
            docker compose build --no-cache frontend ai-agent
            docker compose up -d
            # Run pending migrations (idempotent — safe to re-run)
            docker compose exec -T postgres bash -c '
              DB_USER="${POSTGRES_USER:-supabase}"
              DB_NAME="${POSTGRES_DB:-smart_schedule}"
              PSQL="psql -v ON_ERROR_STOP=1 -U $DB_USER -d $DB_NAME"
              $PSQL -c "CREATE TABLE IF NOT EXISTS _migrations (
                name TEXT PRIMARY KEY, applied_at TIMESTAMPTZ DEFAULT now()
              );"
              # Bootstrap: if tracker is empty but DB already exists, seed migrations
              # that were applied at init time (up to 040). Migrations 041+ are
              # idempotent and will be applied by the loop below.
              COUNT=$($PSQL -tAc "SELECT count(*) FROM _migrations")
              HAS_DB=$($PSQL -tAc "SELECT 1 FROM information_schema.tables WHERE table_name='"'"'resources'"'"'" || echo 0)
              if [ "$COUNT" = "0" ] && [ "$HAS_DB" = "1" ]; then
                echo "Bootstrap: seeding _migrations tracker with init-time migrations"
                for f in $(ls /migrations/*.sql 2>/dev/null | sort); do
                  NAME=$(basename "$f")
                  NUM=${NAME%%_*}
                  if [ "$NUM" -lt 41 ] 2>/dev/null; then
                    $PSQL -c "INSERT INTO _migrations(name) VALUES('"'"'$NAME'"'"') ON CONFLICT DO NOTHING;"
                  fi
                done
              fi
              APPLIED=0
              for f in $(ls /migrations/*.sql 2>/dev/null | sort); do
                NAME=$(basename "$f")
                if ! $PSQL -tAc "SELECT 1 FROM _migrations WHERE name='"'"'$NAME'"'"'" | grep -q 1; then
                  echo "Applying: $NAME"
                  $PSQL -f "$f"
                  $PSQL -c "INSERT INTO _migrations(name) VALUES('"'"'$NAME'"'"');"
                  APPLIED=$((APPLIED+1))
                fi
              done
              echo "Done — $APPLIED migration(s) applied."
            '
            # Reload PostgREST schema cache so new columns are available
            docker compose kill -s SIGUSR1 postgrest
            docker image prune -f
